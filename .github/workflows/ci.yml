name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build-only placeholders; real values come from Vercel at deploy time.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      AUTH_SECRET: ci-build-secret-not-used-at-runtime
      CRON_SECRET: ci-cron-secret-not-used-at-runtime
      BOOTSTRAP_SECRET: ci-bootstrap-secret-not-used-at-runtime
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Database schema contract
        run: pnpm db:schema:check

      - name: Build
        run: pnpm build

      - name: Production-mode smoke
        run: pnpm test:smoke:built
